name: Repo Feasibility Spoke
run-name: spoke-${{ github.event.client_payload.analysis_id || inputs.analysis_id || github.run_id }}-${{ github.repository }}

on:
  repository_dispatch:
    types: [jira_feature_request_spoke]
  workflow_dispatch:
    inputs:
      analysis_id:
        description: analysis correlation id
        required: true
      jira_issue_key:
        description: Jira issue key
        required: true
      jira_summary:
        description: Jira summary
        required: true
      jira_description:
        description: Jira description
        required: true
      jira_priority:
        description: Jira priority
        required: false
        default: Medium
      jira_labels:
        description: Jira labels
        required: false
        default: ""

permissions:
  contents: read

env:
  USE_GREPTILE: "true"
  TOP_FILE_LIMIT: "20"
  MAX_FILE_CHARS: "12000"
  CHUNK_LINES: "180"
  CHUNK_OVERLAP: "40"
  CHUNKS_PER_FILE: "2"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve payload
        id: payload
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "analysis_id=${{ github.event.client_payload.analysis_id }}" >> "$GITHUB_OUTPUT"
            echo "jira_issue_key=${{ github.event.client_payload.jira_issue_key }}" >> "$GITHUB_OUTPUT"
            echo "jira_summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.client_payload.jira_summary }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "jira_description<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.client_payload.jira_description }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "jira_priority=${{ github.event.client_payload.jira_priority }}" >> "$GITHUB_OUTPUT"
            echo "jira_labels=${{ github.event.client_payload.jira_labels }}" >> "$GITHUB_OUTPUT"
          else
            echo "analysis_id=${{ inputs.analysis_id }}" >> "$GITHUB_OUTPUT"
            echo "jira_issue_key=${{ inputs.jira_issue_key }}" >> "$GITHUB_OUTPUT"
            echo "jira_summary<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.jira_summary }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "jira_description<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.jira_description }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "jira_priority=${{ inputs.jira_priority }}" >> "$GITHUB_OUTPUT"
            echo "jira_labels=${{ inputs.jira_labels }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Try Greptile context retrieval
        id: greptile
        run: |
          mkdir -p out
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          use_greptile = os.environ.get("USE_GREPTILE", "false").lower() == "true"
          api_key = os.environ.get("GREPTILE_API_KEY", "").strip()
          context_url = os.environ.get("GREPTILE_CONTEXT_URL", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          branch = os.environ.get("GITHUB_REF_NAME", "main")
          analysis_id = os.environ.get("ANALYSIS_ID", "unknown-analysis")
          query = f"{os.environ.get('JIRA_SUMMARY','')} {os.environ.get('JIRA_DESCRIPTION','')} {os.environ.get('JIRA_LABELS','')}".strip()

          def set_output(name, value):
              with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
                  f.write(f"{name}={value}\n")

          if not use_greptile:
              print("Greptile disabled via USE_GREPTILE")
              set_output("used", "false")
              set_output("source", "local_chunks")
              raise SystemExit(0)

          if not api_key:
              print("GREPTILE_API_KEY missing; falling back to local chunks")
              set_output("used", "false")
              set_output("source", "local_chunks")
              raise SystemExit(0)

          if not context_url:
              context_url = "https://api.greptile.com/v2/query"
              print(f"GREPTILE_CONTEXT_URL missing; defaulting to {context_url}")

          payload = {
              "messages": [
                  {
                      "id": analysis_id,
                      "content": query,
                      "role": "user"
                  }
              ],
              "repositories": [
                  {
                      "remote": "github",
                      "repository": repo,
                      "branch": branch
                  }
              ],
              "sessionId": analysis_id,
              "stream": False,
              "genius": True
          }

          req = urllib.request.Request(
              context_url,
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json",
                  "Accept": "application/json",
              },
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=40) as resp:
                  response = json.loads(resp.read().decode("utf-8"))
          except urllib.error.HTTPError as e:
              body = ""
              try:
                  body = e.read().decode("utf-8", errors="ignore")
              except Exception:
                  pass
              print(f"Greptile request failed with HTTP {e.code}: {body[:500]}")
              set_output("used", "false")
              set_output("source", "local_chunks")
              raise SystemExit(0)
          except Exception as e:
              print(f"Greptile request failed: {e}")
              set_output("used", "false")
              set_output("source", "local_chunks")
              raise SystemExit(0)

          if isinstance(response, dict):
              keys = sorted(response.keys())
              print(f"Greptile response keys: {keys}")
              for key in ("snippets", "results", "hits", "data"):
                  val = response.get(key)
                  if isinstance(val, list):
                      print(f"Greptile list '{key}' size: {len(val)}")
          elif isinstance(response, list):
              print(f"Greptile response is list with size: {len(response)}")
          else:
              print(f"Greptile response type: {type(response).__name__}")

          # Normalize common shapes into workflow context format
          items = []
          for key in ("snippets", "results", "hits", "data"):
              val = response.get(key)
              if isinstance(val, list):
                  items = val
                  break
          if not items and isinstance(response, list):
              items = response

          normalized = []
          for idx, item in enumerate(items):
              if not isinstance(item, dict):
                  continue
              path = item.get("path") or item.get("file_path") or item.get("file") or f"unknown-{idx}"
              snippet = item.get("snippet") or item.get("content") or item.get("text") or ""
              if not isinstance(snippet, str) or not snippet.strip():
                  continue
              normalized.append({
                  "path": path,
                  "file_score": int(item.get("file_score", item.get("score", 0))) if str(item.get("file_score", item.get("score", 0))).isdigit() else 0,
                  "chunk_score": int(item.get("score", 0)) if str(item.get("score", 0)).isdigit() else 0,
                  "start_line": int(item.get("start_line", 1)) if str(item.get("start_line", 1)).isdigit() else 1,
                  "end_line": int(item.get("end_line", 1)) if str(item.get("end_line", 1)).isdigit() else 1,
                  "snippet": snippet[: int(os.environ.get("MAX_FILE_CHARS", "12000"))]
              })

          if not normalized:
              print("Greptile returned no usable snippets; falling back to local chunks")
              set_output("used", "false")
              set_output("source", "local_chunks")
              raise SystemExit(0)

          Path("out/context.json").write_text(json.dumps(normalized, ensure_ascii=True, indent=2), encoding="utf-8")
          Path("out/context-source.txt").write_text("greptile", encoding="utf-8")
          print(f"Greptile context ready with {len(normalized)} snippets")
          set_output("used", "true")
          set_output("source", "greptile")
          PY
        env:
          GREPTILE_API_KEY: ${{ secrets.GREPTILE_API_KEY }}
          GREPTILE_CONTEXT_URL: ${{ secrets.GREPTILE_CONTEXT_URL }}
          ANALYSIS_ID: ${{ steps.payload.outputs.analysis_id }}
          JIRA_SUMMARY: ${{ steps.payload.outputs.jira_summary }}
          JIRA_DESCRIPTION: ${{ steps.payload.outputs.jira_description }}
          JIRA_LABELS: ${{ steps.payload.outputs.jira_labels }}

      - name: Build repo context with targeted chunks
        if: ${{ steps.greptile.outputs.used != 'true' }}
        run: |
          mkdir -p out
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          from pathlib import Path

          top_limit = int(os.environ.get("TOP_FILE_LIMIT", "20"))
          max_chars = int(os.environ.get("MAX_FILE_CHARS", "12000"))
          chunk_lines = int(os.environ.get("CHUNK_LINES", "180"))
          chunk_overlap = int(os.environ.get("CHUNK_OVERLAP", "40"))
          chunks_per_file = int(os.environ.get("CHUNKS_PER_FILE", "2"))

          query = f"{os.environ['JIRA_SUMMARY']} {os.environ['JIRA_DESCRIPTION']} {os.environ['JIRA_LABELS']}".lower()
          keywords = set(re.findall(r"[a-zA-Z_][a-zA-Z0-9_]{3,}", query))
          stop = {"with", "from", "that", "this", "have", "will", "should", "into", "about", "feature", "request"}
          keywords = [k for k in keywords if k not in stop]

          excluded_parts = {".git", "node_modules", "vendor", "dist", "build", "__pycache__", ".next", ".cache", "coverage"}
          excluded_suffixes = {".png", ".jpg", ".jpeg", ".gif", ".zip", ".pdf", ".gz", ".jar", ".exe", ".dll", ".so", ".lock", ".min.js"}

          files = subprocess.run(["git", "ls-files"], capture_output=True, text=True, check=True).stdout.splitlines()
          file_candidates = []
          for rel in files:
              p = Path(rel)
              if any(part in excluded_parts for part in p.parts):
                  continue
              if p.suffix.lower() in excluded_suffixes:
                  continue
              try:
                  txt = p.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue
              if not txt.strip():
                  continue
              sample = txt[:max_chars]
              score = sum((rel.lower() + "\n" + sample.lower()).count(k) for k in keywords) if keywords else 0
              file_candidates.append((score, rel, txt))

          file_candidates.sort(key=lambda x: x[0], reverse=True)
          selected_files = file_candidates[:top_limit]
          context = []

          for file_score, rel, txt in selected_files:
              lines = txt.splitlines()
              step = max(1, chunk_lines - chunk_overlap)
              chunk_candidates = []
              for start in range(0, len(lines), step):
                  end = min(len(lines), start + chunk_lines)
                  chunk_txt = "\n".join(lines[start:end])
                  if not chunk_txt.strip():
                      continue
                  chunk_score = sum((rel.lower() + "\n" + chunk_txt.lower()).count(k) for k in keywords) if keywords else 0
                  total = file_score + chunk_score
                  chunk_candidates.append((total, start + 1, end, chunk_txt[:max_chars]))
                  if end >= len(lines):
                      break
              chunk_candidates.sort(key=lambda x: x[0], reverse=True)
              for total, start_line, end_line, chunk in chunk_candidates[:chunks_per_file]:
                  context.append({
                      "path": rel,
                      "file_score": file_score,
                      "chunk_score": total,
                      "start_line": start_line,
                      "end_line": end_line,
                      "snippet": chunk
                  })

          Path("out/context.json").write_text(json.dumps(context, ensure_ascii=True, indent=2), encoding="utf-8")
          Path("out/context-source.txt").write_text("local_chunks", encoding="utf-8")
          PY
        env:
          JIRA_SUMMARY: ${{ steps.payload.outputs.jira_summary }}
          JIRA_DESCRIPTION: ${{ steps.payload.outputs.jira_description }}
          JIRA_LABELS: ${{ steps.payload.outputs.jira_labels }}

      - name: Produce standardized repo assessment (heuristic, no AI)
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          analysis_id = os.environ["ANALYSIS_ID"]
          repo = os.environ["GITHUB_REPOSITORY"]
          summary = os.environ["JIRA_SUMMARY"].strip()
          description = os.environ["JIRA_DESCRIPTION"].strip()

          try:
              chunks = json.loads(Path("out/context.json").read_text(encoding="utf-8"))
              top_chunks = sorted(chunks, key=lambda x: x.get("chunk_score", 0), reverse=True)[:8]
              components = []
              for item in top_chunks:
                  path = item.get("path", "")
                  root = path.split("/")[0] if "/" in path else path
                  if root and root not in components:
                      components.append(root)
              if not components:
                  components = ["core"]

              max_score = max([c.get("chunk_score", 0) for c in top_chunks], default=0)
              if max_score >= 25:
                  effort = "L"
              elif max_score >= 10:
                  effort = "M"
              else:
                  effort = "S"

              verdict = "feasible" if max_score < 35 else "partially_feasible"
              confidence = min(90, 55 + max_score)

              out = {
                  "analysis_id": analysis_id,
                  "repo_name": repo,
                  "repo_status": "success",
                  "repo_verdict": verdict,
                  "affected_components": components[:6],
                  "effort_estimate": {
                      "size": effort,
                      "rationale": f"Based on {len(top_chunks)} relevant chunks and max relevance score {max_score}."
                  },
                  "risks": [
                      {
                          "severity": "medium" if effort in ("S", "M") else "high",
                          "type": "technical",
                          "detail": "Multiple relevant files indicate cross-module updates may be required."
                      }
                  ],
                  "open_questions": [
                      "Is this repository the source of truth for the requested behavior?",
                      "Do changes here require coordinated updates in other repositories?"
                  ],
                  "confidence_score": int(confidence),
                  "evidence": [
                      {
                          "path": c.get("path"),
                          "start_line": c.get("start_line"),
                          "end_line": c.get("end_line"),
                          "chunk_score": c.get("chunk_score")
                      } for c in top_chunks[:5]
                  ],
                  "request_excerpt": {
                      "summary": summary[:200],
                      "description": description[:400]
                  }
              }
          except Exception as e:
              out = {
                  "analysis_id": analysis_id,
                  "repo_name": repo,
                  "repo_status": "failed",
                  "repo_verdict": "partially_feasible",
                  "affected_components": [],
                  "effort_estimate": {"size": "L", "rationale": "Assessment generation failed; manual review required."},
                  "risks": [{"severity": "high", "type": "technical", "detail": f"Spoke assessment failed: {e}"}],
                  "open_questions": ["Can this repository assessment be retried with healthy context generation?"],
                  "confidence_score": 30
              }

          Path("out/repo-assessment.json").write_text(json.dumps(out, ensure_ascii=True, indent=2), encoding="utf-8")
          PY
        env:
          ANALYSIS_ID: ${{ steps.payload.outputs.analysis_id }}
          JIRA_SUMMARY: ${{ steps.payload.outputs.jira_summary }}
          JIRA_DESCRIPTION: ${{ steps.payload.outputs.jira_description }}

      - name: Upload spoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: assessment-${{ steps.payload.outputs.analysis_id }}-${{ github.event.repository.name }}
          path: out/repo-assessment.json
